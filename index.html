<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Alunos</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
      <header>
        <div class="header-top">
          <img src="assets/logo-at.webp" alt="Logo" class="header-logo">
          <h1>Sistema de Registro de Alunos</h1>
        </div>
        <nav>
          <a href="index.html" class="active">Cadastro</a>
          <a href="consulta.html">Consultar Alunos</a>
        </nav>
      </header>

    <main>
      <div id="coursePanel" class="course-panel"></div>

      <form id="alunoForm">
        <div class="form-row">
          <div class="form-group">
            <label for="numero">Número</label>
            <input type="text" id="numero">
          </div>
          <div class="form-group">
            <label for="nome">Nome do Aluno</label>
            <input type="text" id="nome">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="turno">Turno</label>
            <select id="turno">
              <option value="">Selecione...</option>
              <option value="Manhã">Manhã</option>
              <option value="Tarde">Tarde</option>
              <option value="Noite">Noite</option>
            </select>
          </div>
          <div class="form-group">
            <label for="curso">Curso</label>
            <select id="curso">
              <option value="">Selecione...</option>
            </select>
            <input type="text" id="cursoCustom" class="curso-custom" placeholder="Digite o nome do novo curso..." style="display:none">
          </div>
        </div>

        <div class="form-group">
          <label for="anoInicio">Ano de Início</label>
          <input type="text" id="anoInicio" placeholder="AAAA">
        </div>

        <button type="submit">Cadastrar Aluno</button>
      </form>

      <div id="message" class="message"></div>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
