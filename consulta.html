<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consultar Diplomas</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Sistema de Cadastro de Diplomas</h1>
      <nav>
        <a href="index.html">Cadastro</a>
        <a href="consulta.html" class="active">Consultar Diplomas</a>
      </nav>
    </header>

    <main>
      <div class="search-box">
        <select id="searchType">
          <option value="nome">Buscar por Nome</option>
          <option value="cursoAno">Buscar por Curso + Ano</option>
        </select>
        <div id="searchNomeField" class="search-field">
          <input type="text" id="searchNome" placeholder="Digite o nome do aluno...">
        </div>
        <div id="searchCursoAnoField" class="search-field" style="display:none">
          <input type="text" id="searchCurso" placeholder="Nome do curso...">
          <input type="text" id="searchAno" placeholder="Ano de entrada...">
        </div>
        <button id="btnSearch">Buscar</button>
        <button id="btnAll">Listar Todos</button>
      </div>

      <div id="results">
        <table id="diplomasTable">
          <thead>
            <tr>
              <th>Número</th>
              <th>Nome</th>
              <th>Turno</th>
              <th>Curso</th>
              <th>Modalidade</th>
              <th>Ano Entrada</th>
              <th>Ano Conclusão</th>
              <th>Data Recebimento</th>
              <th>Observação</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <div id="message" class="message"></div>
    </main>
  </div>

  <div id="editModal" class="modal">
    <div class="modal-content">
      <span class="modal-close">&times;</span>
      <h2>Editar Diploma</h2>
      <form id="editForm">
        <div class="form-row">
          <div class="form-group">
            <label for="editNumero">Número do Diploma</label>
            <input type="text" id="editNumero" readonly>
          </div>
          <div class="form-group">
            <label for="editNome">Nome do Aluno *</label>
            <input type="text" id="editNome" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="editTurno">Turno *</label>
            <select id="editTurno" required>
              <option value="">Selecione...</option>
              <option value="Manhã">Manhã</option>
              <option value="Tarde">Tarde</option>
              <option value="Noite">Noite</option>
            </select>
          </div>
          <div class="form-group">
            <label for="editCurso">Curso *</label>
            <input type="text" id="editCurso" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="editModalidade">Modalidade *</label>
            <select id="editModalidade" required>
              <option value="">Selecione...</option>
              <option value="Integrado">Integrado</option>
              <option value="Subsequente">Subsequente</option>
              <option value="Ejatec">Ejatec</option>
            </select>
          </div>
          <div class="form-group">
            <label for="editAnoEntrada">Ano de Entrada *</label>
            <input type="text" id="editAnoEntrada" inputmode="numeric" pattern="[0-9]{4}" title="Apenas 4 dígitos" placeholder="AAAA" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="editAnoConclusao">Ano de Conclusão *</label>
            <input type="text" id="editAnoConclusao" inputmode="numeric" pattern="[0-9]{4}" title="Apenas 4 dígitos" placeholder="AAAA" required>
          </div>
          <div class="form-group">
            <label for="editDataRecebimento">Data de Recebimento</label>
            <input type="date" id="editDataRecebimento">
          </div>
        </div>

        <div class="form-group">
          <label for="editObservacao">Observação</label>
          <textarea id="editObservacao" rows="3"></textarea>
        </div>

        <div class="modal-actions">
          <button type="submit" id="btnSaveEdit">Salvar Alterações</button>
          <button type="button" id="btnCancelEdit" class="btn-secondary">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
