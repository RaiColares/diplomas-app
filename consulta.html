<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consultar Alunos</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
      <header>
        <div class="header-top">
          <img src="assets/logo-at.webp" alt="Logo" class="header-logo">
          <h1>Sistema de Registro de Alunos</h1>
        </div>
        <nav>
          <a href="index.html">Cadastro</a>
          <a href="consulta.html" class="active">Consultar Alunos</a>
        </nav>
      </header>

    <main>
      <div class="search-box">
        <select id="searchType">
          <option value="nome">Buscar por Nome</option>
          <option value="cursoAno">Buscar por Curso + Ano</option>
        </select>
        <div id="searchNomeField" class="search-field">
          <input type="text" id="searchNome" placeholder="Digite o nome do aluno...">
        </div>
        <div id="searchCursoAnoField" class="search-field" style="display:none">
          <select id="searchCurso">
            <option value="">Todos os cursos</option>
          </select>
          <input type="text" id="searchAno" placeholder="Ano de início...">
        </div>
        <button id="btnSearch">Buscar</button>
        <button id="btnAll">Listar Todos</button>
      </div>

      <div id="results">
        <table id="diplomasTable">
          <thead>
            <tr>
              <th>Número</th>
              <th>Nome</th>
              <th>Turno</th>
              <th>Curso</th>
              <th>Ano Início</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <div class="table-controls">
        <div class="page-size-selector">
          <label for="pageSize">Registros por página:</label>
          <select id="pageSize">
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="30">30</option>
          </select>
        </div>
        <div id="pagination" class="pagination"></div>
      </div>

      <div id="message" class="message"></div>
    </main>
  </div>

  <div id="editModal" class="modal">
    <div class="modal-content">
      <span class="modal-close">&times;</span>
      <h2>Editar Aluno</h2>
      <form id="editForm">
        <div class="form-row">
          <div class="form-group">
            <label for="editNumero">Número</label>
            <input type="text" id="editNumero" readonly>
          </div>
          <div class="form-group">
            <label for="editNome">Nome do Aluno</label>
            <input type="text" id="editNome">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="editTurno">Turno</label>
            <select id="editTurno">
              <option value="">Selecione...</option>
              <option value="Manhã">Manhã</option>
              <option value="Tarde">Tarde</option>
              <option value="Noite">Noite</option>
            </select>
          </div>
          <div class="form-group">
            <label for="editCurso">Curso</label>
            <select id="editCurso">
              <option value="">Selecione...</option>
            </select>
            <input type="text" id="editCursoCustom" class="curso-custom" placeholder="Digite o nome do novo curso..." style="display:none">
          </div>
        </div>

        <div class="form-group">
          <label for="editAnoInicio">Ano de Início</label>
          <input type="text" id="editAnoInicio" placeholder="AAAA">
        </div>

        <div class="modal-actions">
          <button type="submit" id="btnSaveEdit">Salvar Alterações</button>
          <button type="button" id="btnCancelEdit" class="btn-secondary">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="loginModal" class="modal">
    <div class="modal-content login-modal-content">
      <span class="modal-close" onclick="closeLoginModal()">&times;</span>
      <h2>Acesso Restrito</h2>
      <p class="login-subtitle">Digite a senha de administrador</p>
      <div class="form-group">
        <label for="loginPass">Senha</label>
        <div class="password-wrapper">
          <input type="password" id="loginPass" placeholder="Digite a senha">
          <button type="button" class="toggle-password" onclick="mostrarSenha(this)" tabindex="-1">👁</button>
        </div>
      </div>
      <div id="loginError" class="message error" style="display:none"></div>
      <div class="modal-actions">
        <button onclick="handleLogin()">Entrar</button>
        <button class="btn-secondary" onclick="closeLoginModal()">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
